<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrtogràfiCat</title>
  <style>
    :root {
      --bg: #f6faf6;
      --card: #ffffff;
      --text: #16301f;
      --muted: #61746a;
      --primary: #2e7d32;
      --primary-2: #4caf50;
      --border: #d7e3d8;
      --danger: #c62828;
      --warning: #ef6c00;
      --shadow: 0 10px 24px rgba(20, 50, 30, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); }
    button, input, select { font: inherit; }
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; background: rgba(255,255,255,0.9); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
    }
    .brand { font-weight: 800; font-size: 1.3rem; }
    .top-actions { display: flex; gap: 10px; align-items: center; }
    .container { width: min(980px, calc(100% - 24px)); margin: 18px auto 28px; }
    .screen { display: none; }
    .screen.active { display: block; }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 18px;
    }
    .hero { display: grid; gap: 12px; }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 1.8rem; }
    h2 { font-size: 1.35rem; }
    .muted { color: var(--muted); }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .space { height: 14px; }
    .btn {
      border: 0; background: var(--primary); color: white; padding: 12px 16px; border-radius: 14px;
      cursor: pointer; font-weight: 700; transition: .18s transform, .18s opacity, .18s background;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.secondary { background: white; color: var(--text); border: 1px solid var(--border); }
    .btn.ghost { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    .btn.danger { background: var(--danger); }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .pill {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px;
      border: 1px solid var(--border); background: white; font-weight: 600;
    }
    .grid { display: grid; gap: 14px; }
    .grid.profiles { grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); }
    .grid.worlds, .grid.levels { grid-template-columns: 1fr; }
    .profile-card, .world-card, .level-card {
      display: grid; gap: 12px; padding: 16px; border-radius: 18px; background: white; border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .profile-head, .world-head, .level-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .avatar {
      width: 62px; height: 62px; display: grid; place-items: center; font-size: 1.8rem;
      border-radius: 50%; background: #eaf5ea; border: 1px solid var(--border);
    }
    .active-badge { color: var(--primary); font-weight: 800; }
    .locked { opacity: .62; }
    .stats { display: flex; gap: 10px; flex-wrap: wrap; }
    .world-emoji, .flag { font-size: 1.7rem; }
    .actions-inline { display: flex; gap: 8px; flex-wrap: wrap; }
    .activity-card { padding: 20px; }
    .question { font-size: 1.45rem; font-weight: 800; line-height: 1.35; }
    .options { display: grid; gap: 10px; margin-top: 18px; }
    .option-btn {
      width: 100%; text-align: left; background: white; color: var(--text); border: 1px solid var(--border);
      padding: 14px 16px; border-radius: 14px; cursor: pointer; font-weight: 600;
    }
    .option-btn:hover { border-color: var(--primary); }
    .progressbar { width: 100%; height: 12px; border-radius: 999px; background: #e7f1e8; overflow: hidden; }
    .progressbar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-2)); }
    .feedback-good { color: var(--primary); font-weight: 800; }
    .feedback-bad { color: var(--warning); font-weight: 800; }
    .stars { letter-spacing: 2px; }
    .empty { text-align: center; padding: 30px 18px; }
    .hidden { display: none !important; }
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(10, 24, 12, 0.42); display: none;
      align-items: center; justify-content: center; padding: 18px; z-index: 20;
    }
    .modal-backdrop.active { display: flex; }
    .modal { width: min(520px, 100%); background: white; border-radius: 20px; padding: 18px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .field { display: grid; gap: 8px; }
    input[type="text"] {
      width: 100%; padding: 12px 14px; border-radius: 14px; border: 1px solid var(--border); outline: none;
    }
    input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(46,125,50,.12); }
    .avatar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .avatar-choice {
      border: 1px solid var(--border); border-radius: 16px; padding: 12px; text-align: center; cursor: pointer; background: white;
      font-size: 1.6rem;
    }
    .avatar-choice.selected { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(46,125,50,.12); }
    .error-text { color: var(--danger); font-size: 0.95rem; font-weight: 700; }
    .summary { display: grid; gap: 10px; }

    .intro-hero {
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 18px;
      padding: clamp(22px, 4vw, 34px);
      min-height: 430px;
      color: #ffffff;
      border: 0;
      background:
        radial-gradient(circle at 86% 42%, rgba(172, 52, 255, .58), transparent 18%),
        radial-gradient(circle at 12% 18%, rgba(76, 195, 255, .45), transparent 24%),
        linear-gradient(115deg, #0f8edb 0%, #19b58f 32%, #193d75 58%, #2b1158 100%);
      box-shadow: 0 20px 48px rgba(11, 39, 76, .22);
    }
    .intro-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 8% 78%, rgba(255,255,255,.25), transparent 12%),
        radial-gradient(circle at 30% 74%, rgba(255, 216, 77, .22), transparent 12%),
        radial-gradient(circle at 72% 70%, rgba(0,0,0,.22), transparent 23%);
      pointer-events: none;
    }
    .intro-hero::after {
      content: "🏰";
      position: absolute;
      right: 24px;
      top: 46px;
      font-size: clamp(4.2rem, 12vw, 8rem);
      opacity: .28;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,.25));
      transform: rotate(4deg);
      pointer-events: none;
    }
    .intro-content {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 16px;
      max-width: 720px;
    }
    .intro-kicker {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(255, 248, 224, .95);
      color: #714000;
      font-weight: 900;
      border: 2px solid rgba(255, 208, 80, .85);
      box-shadow: 0 8px 16px rgba(0,0,0,.13);
    }
    .intro-title {
      font-size: clamp(2.35rem, 7vw, 4.5rem);
      line-height: .95;
      letter-spacing: -1.5px;
      color: #fff7df;
      text-shadow: 0 5px 0 #09254d, 0 10px 18px rgba(0,0,0,.30);
    }
    .intro-title .cat-highlight {
      color: #ffc928;
      text-shadow: 0 5px 0 #09254d, 0 10px 18px rgba(0,0,0,.30);
    }
    .intro-text {
      max-width: 690px;
      font-size: 1.08rem;
      line-height: 1.55;
      color: #f5fbff;
      text-shadow: 0 2px 5px rgba(0,0,0,.22);
    }
    .cover-scene {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(170px, 240px);
      gap: 16px;
      align-items: end;
    }
    .hero-characters {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      min-height: 94px;
    }
    .hero-character {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 3rem;
      background: linear-gradient(145deg, #fff4bc, #ffcc4d);
      border: 4px solid #fff7d7;
      box-shadow: 0 10px 0 rgba(7, 35, 72, .45), 0 16px 22px rgba(0,0,0,.18);
    }
    .hero-pencil {
      font-size: 4.8rem;
      transform: rotate(-18deg);
      filter: drop-shadow(0 8px 6px rgba(0,0,0,.28));
    }
    .monster-card {
      justify-self: end;
      align-self: stretch;
      display: grid;
      place-items: center;
      min-height: 140px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(61, 14, 87, .92), rgba(20, 10, 42, .94));
      border: 2px solid rgba(255,255,255,.18);
      box-shadow: inset 0 0 28px rgba(197, 78, 255, .25), 0 14px 25px rgba(0,0,0,.24);
      color: white;
      text-align: center;
      padding: 14px;
    }
    .monster-face {
      font-size: 4rem;
      line-height: 1;
      filter: drop-shadow(0 6px 6px rgba(0,0,0,.3));
    }
    .monster-text {
      margin-top: 6px;
      font-weight: 900;
      font-size: .95rem;
      color: #ffe08a;
    }
    .mission-box {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 8px;
      max-width: 760px;
      padding: 15px 17px;
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(255, 244, 198, .96), rgba(255, 213, 112, .96));
      border: 2px solid rgba(126, 70, 0, .32);
      box-shadow: 0 10px 0 rgba(102, 56, 0, .20), 0 18px 24px rgba(0,0,0,.18);
      line-height: 1.5;
    }
    .mission-title {
      font-weight: 950;
      color: #5c3100;
    }
    .mission-text {
      color: #2e1b00;
      font-weight: 750;
    }
    .intro-world-icons {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .world-orb {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-size: 1.7rem;
      background: rgba(255, 255, 255, .92);
      border: 3px solid #ffd04f;
      box-shadow: 0 8px 0 rgba(7, 35, 72, .36), 0 12px 18px rgba(0,0,0,.16);
    }
    .intro-features {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .intro-feature {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 12px;
      border-radius: 999px;
      color: #fffbe7;
      background: rgba(7, 35, 72, .42);
      border: 1px solid rgba(255,255,255,.24);
      font-weight: 900;
      font-size: .98rem;
      box-shadow: 0 8px 16px rgba(0,0,0,.13);
    }
    .intro-feature:not(:last-child)::after { content: none; }
    .intro-actions {
      position: relative;
      z-index: 1;
    }
    .intro-hero .btn {
      background: linear-gradient(180deg, #35b84c, #197b2b);
      border: 2px solid rgba(255,255,255,.55);
      box-shadow: 0 8px 0 rgba(6, 74, 28, .55), 0 14px 18px rgba(0,0,0,.18);
    }
    .intro-hero .btn:hover { transform: translateY(-2px); }
    @media (max-width: 760px) {
      .cover-scene { grid-template-columns: 1fr; }
      .monster-card { justify-self: stretch; min-height: 110px; }
      .hero-character { width: 68px; height: 68px; font-size: 2.4rem; }
      .hero-pencil { font-size: 4rem; }
      .intro-hero::after { top: 70px; right: 8px; opacity: .18; }
    }

    .text-challenge {
      display: grid;
      gap: 14px;
    }
    .challenge-instructions {
      background: #f1f8f2;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      line-height: 1.45;
    }
    .challenge-text {
      line-height: 2.25;
      font-size: 1.12rem;
    }
    .word-btn {
      display: inline-block;
      margin: 3px 2px;
      padding: 4px 8px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
    }
    .word-btn:hover:not(:disabled) {
      background: #eef8ef;
      border-color: var(--primary);
    }
    .word-btn.found {
      background: #e0f2e2;
      border-color: var(--primary);
      color: var(--primary);
      text-decoration: line-through;
    }
    .word-btn:disabled {
      cursor: default;
    }
    .challenge-feedback {
      min-height: 48px;
      border-radius: 16px;
      padding: 12px 14px;
      background: #fff8ee;
      border: 1px solid #f3d2a8;
      line-height: 1.45;
    }

    .victory-card {
      display: grid;
      gap: 16px;
      justify-items: center;
      text-align: center;
      background:
        radial-gradient(circle at top, rgba(255, 214, 102, 0.24), transparent 38%),
        linear-gradient(135deg, #ffffff 0%, #f1f8f2 100%);
    }
    .defeated-monster {
      width: min(260px, 80vw);
      border-radius: 24px;
      background: #fff8ee;
      border: 1px solid #f3d2a8;
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .victory-text {
      max-width: 680px;
      line-height: 1.55;
      font-size: 1.05rem;
    }



    /* Millora de llegibilitat de la portada */
    .intro-content {
      background: rgba(255, 255, 255, .86);
      border: 2px solid rgba(255, 208, 80, .72);
      border-radius: 26px;
      padding: clamp(16px, 3vw, 24px);
      box-shadow: 0 14px 28px rgba(0,0,0,.16);
      backdrop-filter: blur(3px);
    }
    .intro-title {
      color: #10351f;
      text-shadow:
        0 2px 0 #ffe08a,
        0 4px 0 rgba(9, 37, 77, .20),
        0 8px 14px rgba(0,0,0,.18);
    }
    .intro-title .cat-highlight {
      color: #c76a00;
      text-shadow:
        0 2px 0 #ffe08a,
        0 4px 0 rgba(9, 37, 77, .20),
        0 8px 14px rgba(0,0,0,.18);
    }
    .intro-text {
      color: #173323;
      font-weight: 650;
      text-shadow: none;
    }


    .ranking-card {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(255, 193, 7, 0.22), transparent 32%),
        linear-gradient(135deg, #ffffff 0%, #f7fbff 100%);
    }
    .ranking-table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 16px;
      background: white;
      box-shadow: var(--shadow);
    }
    .ranking-table th,
    .ranking-table td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: middle;
    }
    .ranking-table th {
      background: #eaf5ea;
      color: var(--text);
      font-weight: 900;
    }
    .ranking-table tr:last-child td {
      border-bottom: 0;
    }
    .ranking-position {
      font-weight: 900;
      font-size: 1.05rem;
      width: 58px;
    }
    .ranking-score {
      font-weight: 900;
      color: var(--primary);
    }
    .ranking-note {
      background: #fff8ee;
      border: 1px solid #f3d2a8;
      border-radius: 16px;
      padding: 12px 14px;
      line-height: 1.45;
    }

    @media (max-width: 640px) {
      .container { width: calc(100% - 16px); }
      .topbar { padding: 14px 12px; }
      .avatar-grid { grid-template-columns: repeat(2, 1fr); }
      .question { font-size: 1.25rem; }
    }
  
    /* === Estètica global coherent amb la portada === */
    :root {
      --bg: #eef8f1;
      --card: #ffffff;
      --text: #092b22;
      --muted: #4d675f;
      --primary: #1f8f38;
      --primary-2: #35b84c;
      --border: #cfe3d3;
      --gold: #ffd04f;
      --gold-dark: #9a5b00;
      --blue-shadow: #09254d;
      --fantasy-shadow: 0 14px 0 rgba(7, 35, 72, .10), 0 18px 28px rgba(20, 50, 30, .10);
      --radius: 22px;
    }

    body {
      background:
        radial-gradient(circle at 10% 8%, rgba(70, 195, 255, .18), transparent 28%),
        radial-gradient(circle at 92% 12%, rgba(112, 52, 204, .13), transparent 25%),
        linear-gradient(180deg, #f8fff9 0%, #edf7ee 52%, #e7f2ea 100%);
    }

    .topbar {
      margin: 14px auto 0;
      width: min(980px, calc(100% - 24px));
      border: 1px solid rgba(207, 227, 211, .95);
      border-radius: 24px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 10px 24px rgba(7, 35, 72, .08);
    }

    .brand {
      font-weight: 950;
      letter-spacing: .2px;
      color: #12351d;
      text-shadow: 0 1px 0 rgba(255,255,255,.85);
    }

    .container {
      margin-top: 20px;
    }

    .card,
    .profile-card,
    .world-card,
    .level-card,
    .modal {
      border-radius: 24px;
      border: 1px solid rgba(207, 227, 211, .98);
      box-shadow: var(--fantasy-shadow);
    }

    .card {
      background:
        radial-gradient(circle at top right, rgba(255, 208, 79, .10), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,.97), rgba(250,255,251,.97));
    }

    .btn {
      border-radius: 18px;
      background: linear-gradient(180deg, var(--primary-2), #177a2d);
      border: 2px solid rgba(255,255,255,.62);
      box-shadow: 0 6px 0 rgba(6, 74, 28, .34), 0 12px 16px rgba(0,0,0,.10);
      letter-spacing: .1px;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 3px 0 rgba(6, 74, 28, .38), 0 8px 12px rgba(0,0,0,.10);
    }

    .btn.secondary {
      background: linear-gradient(180deg, #ffffff, #f4fbf5);
      color: #16301f;
      border: 1px solid rgba(207, 227, 211, 1);
      box-shadow: 0 5px 0 rgba(7, 35, 72, .08), 0 9px 14px rgba(0,0,0,.06);
    }

    .btn.ghost {
      background: rgba(255,255,255,.82);
      color: var(--primary);
      border: 2px solid rgba(31, 143, 56, .42);
      box-shadow: none;
    }

    .pill {
      background: rgba(255, 248, 224, .92);
      border: 1px solid rgba(255, 208, 79, .75);
      color: #5c3100;
      font-weight: 900;
      box-shadow: 0 4px 0 rgba(154, 91, 0, .10);
    }

    .profile-card {
      background:
        radial-gradient(circle at 92% 16%, rgba(255, 208, 79, .14), transparent 26%),
        linear-gradient(145deg, #ffffff, #f6fff7);
    }

    .avatar {
      background: linear-gradient(145deg, #fff4bc, #ffcc4d);
      border: 3px solid #fff7d7;
      box-shadow: 0 7px 0 rgba(7, 35, 72, .14);
    }

    .avatar-choice {
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff, #f8fff9);
      box-shadow: 0 4px 0 rgba(7, 35, 72, .06);
    }

    .avatar-choice.selected {
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(255, 208, 79, .28), 0 6px 0 rgba(7, 35, 72, .08);
    }

    .world-card {
      position: relative;
      overflow: hidden;
      grid-template-columns: auto 1fr;
      align-items: center;
      background:
        radial-gradient(circle at 96% 18%, rgba(255, 208, 79, .16), transparent 24%),
        linear-gradient(135deg, #ffffff 0%, #f4fbf5 100%);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .world-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 8px;
      background: linear-gradient(180deg, #ffd04f, #35b84c);
      opacity: .85;
    }

    .world-card:hover:not(.locked) {
      transform: translateY(-2px);
      border-color: rgba(255, 208, 79, .85);
      box-shadow: 0 15px 0 rgba(7, 35, 72, .10), 0 24px 34px rgba(20, 50, 30, .12);
    }

    .world-head {
      grid-column: 1 / -1;
    }

    .world-emoji,
    .flag {
      display: inline-grid;
      place-items: center;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(145deg, #fff4bc, #ffcc4d);
      border: 3px solid #fff7d7;
      box-shadow: 0 7px 0 rgba(7, 35, 72, .14), 0 10px 14px rgba(0,0,0,.08);
      font-size: 1.85rem;
      flex: 0 0 auto;
    }

    .world-card h3,
    .level-card h3 {
      font-weight: 950;
      color: #12351d;
    }

    .locked {
      filter: grayscale(.18);
      opacity: .70;
    }

    .level-card {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 96% 22%, rgba(70, 195, 255, .10), transparent 24%),
        linear-gradient(180deg, #ffffff, #f7fff8);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .level-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 5px;
      background: linear-gradient(90deg, var(--primary), var(--gold));
      opacity: .78;
    }

    .level-card:hover:not(.locked) {
      transform: translateY(-2px);
      border-color: rgba(53, 184, 76, .45);
    }

    .activity-card {
      background:
        radial-gradient(circle at 95% 8%, rgba(255, 208, 79, .13), transparent 28%),

  function loadProfiles() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.profiles) || '[]'); }
    catch { return []; }
  }
  function saveProfiles(profiles) { localStorage.setItem(STORAGE_KEYS.profiles, JSON.stringify(profiles)); }

  function clearActiveProfileId() { localStorage.removeItem(STORAGE_KEYS.activeProfileId); }
  function progressKey(profileId) { return STORAGE_KEYS.progressPrefix + profileId; }
  function loadProgress(profileId) {
    try { return JSON.parse(localStorage.getItem(progressKey(profileId)) || 'null'); }
    catch { return null; }
  }
  function saveProgress(profileId, progress) { localStorage.setItem(progressKey(profileId), JSON.stringify(progress)); }
  function defaultProgress(profileId) {
    return {
      profileId,
      unlockedWorldIds: ['world_bv'],
      completedLevelIds: [],
      bestStarsByLevel: {},
      lastWorldId: null,
      lastLevelId: null,
      skillProgress: { bv: 0, gj: 0, accents: 0 }
    };
  }
  function getOrCreateProgress(profileId) {
    let p = loadProgress(profileId);
    if (!p) {
      p = defaultProgress(profileId);
      saveProgress(profileId, p);
    }
    let migrated = false;
    if (p.completedLevelIds?.includes('bv_final') && !p.unlockedWorldIds.includes('world_gj')) {
      p.unlockedWorldIds.push('world_gj');
      migrated = true;
    }
    if (p.completedLevelIds?.includes('gj_final') && !p.unlockedWorldIds.includes('world_cqu')) {
      p.unlockedWorldIds.push('world_cqu');
      migrated = true;
    }
    if (p.completedLevelIds?.includes('cqu_final') && !p.unlockedWorldIds.includes('world_rr')) {
      p.unlockedWorldIds.push('world_rr');
      migrated = true;
    }
    if (p.completedLevelIds?.includes('rr_final') && !p.unlockedWorldIds.includes('world_h')) {
      p.unlockedWorldIds.push('world_h');
      migrated = true;
    }
    if (p.completedLevelIds?.includes('h_final') && !p.unlockedWorldIds.includes('world_syllables')) {
      p.unlockedWorldIds.push('world_syllables');
      migrated = true;
    }
    if (p.completedLevelIds?.includes('sy_final') && !p.unlockedWorldIds.includes('world_tonic')) {
      p.unlockedWorldIds.push('world_tonic');
      migrated = true;
    }
    if (p.completedLevelIds?.includes('ton_final') && !p.unlockedWorldIds.includes('world_dh')) {
      p.unlockedWorldIds.push('world_dh');
      migrated = true;
    }
    if (p.completedLevelIds?.includes('dh_final') && !p.unlockedWorldIds.includes('world_accents')) {
      p.unlockedWorldIds.push('world_accents');
      migrated = true;
    }
    if (migrated) saveProgress(profileId, p);
    return p;
  }
  function deleteProgress(profileId) { localStorage.removeItem(progressKey(profileId)); }
  function getActiveProfile() {
    const id = getActiveProfileId();
    if (!id) return null;
    return loadProfiles().find(p => p.id === id) || null;
  }
  function profileAvatar(profile) { return AVATARS[profile.avatarId] || '🙂'; }
  function worldById(id) { return WORLDS.find(w => w.id === id); }
  function levelsForWorld(worldId) { return LEVELS.filter(l => l.worldId === worldId).sort((a,b) => a.order - b.order); }
  function activitiesForLevel(levelId) { return ACTIVITIES.filter(a => a.levelId === levelId).sort((a,b) => a.id.localeCompare(b.id)); }
  function totalStars(progress) { return Object.values(progress.bestStarsByLevel || {}).reduce((a,b) => a + b, 0); }
  function isWorldUnlocked(progress, worldId) { return progress.unlockedWorldIds.includes(worldId); }
  function isLevelUnlocked(levels, progress, level) {
    if (level.order === 1) return true;
    if (level.isFinalChallenge) {
      const regular = levels.filter(l => !l.isFinalChallenge);
      return regular.every(l => progress.completedLevelIds.includes(l.id));
    }
    const prev = levels.find(l => l.order === level.order - 1);
    return !!prev && progress.completedLevelIds.includes(prev.id);
  }
  function starsForLevel(progress, levelId) { return progress.bestStarsByLevel[levelId] || 0; }
  function calculateStars(wrongAnswers) { return wrongAnswers === 0 ? 3 : wrongAnswers === 1 ? 2 : 1; }

  function rankingScore(progress) {
    const completed = (progress.completedLevelIds || []).length;
    const unlocked = (progress.unlockedWorldIds || []).length;
    const castleBonus = (progress.completedLevelIds || []).includes('castle_final') ? 500 : 0;
    return (totalStars(progress) * 100) + (completed * 25) + (unlocked * 10) + castleBonus;
  }

  function currentWorldTitle(progress) {
    const world = worldById(progress.lastWorldId);
    return world ? world.title : '';
  }

  function currentLevelTitle(progress) {
    const level = LEVELS.find(l => l.id === progress.lastLevelId);
    return level ? level.title : '';
  }

  function submitRankingScore(profile, progress) {
    if (!isRankingConfigured() || !profile || !progress) return;

    const params = new URLSearchParams();
    params.append('nom', profile.name || 'Jugador');
    params.append('avatar', profileAvatar(profile));
    params.append('puntuacio', rankingScore(progress));
    params.append('estrelles', totalStars(progress));
    params.append('nivellsCompletats', (progress.completedLevelIds || []).length);
    params.append('monsDesbloquejats', (progress.unlockedWorldIds || []).length);
    params.append('monActual', currentWorldTitle(progress));
    params.append('nivellActual', currentLevelTitle(progress));

    fetch(RANKING_WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: params
    }).catch(() => {
      // El joc continua encara que el rànquing no respongui.
    });
  }

  function loadRanking() {
    const content = $('#rankingContent');
    if (!content) return;

    if (!isRankingConfigured()) {
      content.innerHTML = `
        <div class="empty">
          <h2>Configura primer el rànquing</h2>
          <div class="space"></div>
          <p class="muted">Enganxa la URL de l’aplicació web d’Apps Script dins la constant <strong>RANKING_WEB_APP_URL</strong> del fitxer HTML.</p>
        </div>
      `;
      return;
    }

    content.innerHTML = `<p class="muted">Carregant rànquing...</p>`;

    const callbackName = 'ortograficatRankingCallback_' + Date.now();
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      content.innerHTML = `
        <div class="empty">
          <h2>No s’ha pogut carregar el rànquing</h2>
          <div class="space"></div>
          <p class="muted">Revisa que l’Apps Script estigui implementat com a aplicació web i amb accés per a qualsevol usuari.</p>
        </div>
      `;
    }, 9000);

    function cleanup() {
      clearTimeout(timeout);
      if (script.parentNode) script.parentNode.removeChild(script);
      try { delete window[callbackName]; } catch { window[callbackName] = undefined; }
    }

    window[callbackName] = (response) => {
      cleanup();
      const ranking = Array.isArray(response) ? response : (response?.ranking || []);
      renderRankingTable(ranking);
    };

    const sep = RANKING_WEB_APP_URL.includes('?') ? '&' : '?';
    script.src = `${RANKING_WEB_APP_URL}${sep}action=ranking&callback=${encodeURIComponent(callbackName)}&t=${Date.now()}`;
    script.onerror = () => {
      cleanup();
      content.innerHTML = `
        <div class="empty">
          <h2>Error carregant el rànquing</h2>
          <div class="space"></div>
          <p class="muted">Comprova la URL de l’Apps Script i els permisos de publicació.</p>
        </div>
      `;
    };
    document.body.appendChild(script);
  }

  function renderRankingTable(ranking) {
    const content = $('#rankingContent');

      content.innerHTML = `

  function nowIso() { return new Date().toISOString(); }

  saveProfileBtn.addEventListener('click', () => {
    const rawName = profileNameInput.value.trim();

    if (!rawName) {
      profileNameError.textContent = 'Has d’escriure un nom.';

    if (state.editingProfileId) {
      const idx = profiles.findIndex(p => p.id === state.editingProfileId);
      if (idx >= 0) {
        profiles[idx] = { ...profiles[idx], name: rawName, avatarId: avatarSelected, lastPlayedAt: nowIso() };
        saveProfiles(profiles);
      }
    } else {
      const profile = {
        id: uid(),
        name: rawName,
        avatarId: avatarSelected,
        createdAt: nowIso(),
        lastPlayedAt: nowIso()
      };
      profiles.push(profile);
      saveProfiles(profiles);
      setActiveProfileId(profile.id);
      getOrCreateProgress(profile.id);

    renderProfilesScreen();

          return;
        }
        renderLevelsScreen(worldId);
      });
    });
  }

  function renderLevelsScreen(worldId) {
    const profile = getActiveProfile();
    if (!profile) return renderProfilesScreen();
    const progress = getOrCreateProgress(profile.id);
    const world = worldById(worldId);
    if (!world) return renderMapScreen();
    const levels = levelsForWorld(worldId);
    state.currentWorldId = worldId;
    screens.levels.innerHTML = `
      <div class="card summary">
        <h1>${world.emoji} ${escapeHtml(world.title)}</h1>
        <p class="muted">${escapeHtml(world.description)}</p>
        <div class="stats">
          <div class="pill">Jugador: ${escapeHtml(profile.name)}</div>
          <div class="pill">Nivells completats: ${levels.filter(l => progress.completedLevelIds.includes(l.id)).length}/${levels.length}</div>
        </div>
      </div>
      <div class="space"></div>
      <div class="grid levels">
        ${levels.map(level => {
          const unlocked = isLevelUnlocked(levels, progress, level);
          const stars = starsForLevel(progress, level.id);
          return `
            <div class="level-card ${unlocked ? '' : 'locked'}">
              <div class="level-head">
                <div class="row" style="align-items:center;">
                  <div class="avatar">${level.isFinalChallenge ? '🏁' : level.order}</div>
                  <div>
                    <h3>${escapeHtml(level.title)}</h3>
                    <div class="space"></div>
                    <p class="muted">${escapeHtml(level.instructions)}</p>
                  </div>
                </div>
                <div class="stars">${'⭐'.repeat(stars)}</div>
              </div>
              <div class="actions-inline">
                <button class="btn ${unlocked ? '' : 'secondary'}" data-open-level="${level.id}">${unlocked ? 'Jugar nivell' : 'Bloquejat'}</button>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    switchScreen('levels');
    screens.levels.querySelectorAll('[data-open-level]').forEach(btn => {
      btn.addEventListener('click', () => {
        const levelId = btn.dataset.openLevel;
        const level = levels.find(l => l.id === levelId);
        if (!level) return;
        if (!isLevelUnlocked(levels, progress, level)) {
          alert('Completa el nivell anterior per desbloquejar-lo.');
          return;
        }
        startGame(levelId);
      });
    });
  }

  function startGame(levelId) {
    const profile = getActiveProfile();
    if (!profile) return renderProfilesScreen();
    const progress = getOrCreateProgress(profile.id);
    const level = LEVELS.find(l => l.id === levelId);
    const activities = activitiesForLevel(levelId);
    if (!level || activities.length === 0) {
      alert('No s’ha pogut carregar aquest nivell.');
      return;
    }
    state.currentLevelId = levelId;
    state.game = {
      profile,
      progress,
      level,
      activities,
      index: 0,
      correct: 0,
      wrong: 0
    };
    renderGameScreen();
  }

  function renderGameScreen() {
    const g = state.game;
    if (!g) return renderLevelsScreen(state.currentWorldId);
    const activity = g.activities[g.index];
    const total = g.activities.length;

    if (activity.type === 'findAllErrors') {
      if (!g.challenge) g.challenge = { found: [], wrongClicks: 0 };
      const foundCount = g.challenge.found.length;
      screens.game.innerHTML = `
        <div class="card summary">
          <div class="row" style="justify-content:space-between;align-items:center;">
            <div>
              <h2>${escapeHtml(g.level.title)}</h2>
              <p class="muted">Jugador: ${escapeHtml(g.profile.name)}</p>
            </div>
            <div class="pill">Errades trobades: <span id="foundCounter">${foundCount}</span>/${activity.errorsToFind}</div>
          </div>
          <div class="space"></div>
          <div class="progressbar"><span id="challengeProgress" style="width:${(foundCount/activity.errorsToFind)*100}%"></span></div>
        </div>
        <div class="space"></div>
        <div class="card activity-card text-challenge">
          <p class="muted">${escapeHtml(activity.prompt)}</p>
          <div class="challenge-instructions"><strong>Què has de fer?</strong> ${escapeHtml(activity.question)}</div>
          <div class="challenge-text" aria-label="Text del repte final">
            ${activity.tokens.map((token, index) => `<button class="word-btn" data-token-index="${index}" type="button">${escapeHtml(token.text)}</button>`).join(' ')}
          </div>
          <div id="challengeFeedback" class="challenge-feedback muted">
            Llegeix bé el text. No totes les paraules clicables són errades.
          </div>
          <button id="finishChallengeBtn" class="btn hidden">Acabar repte</button>
        </div>
      `;
      switchScreen('game');
      updateChallengeView(activity);
      screens.game.querySelectorAll('[data-token-index]').forEach(btn => {
        btn.addEventListener('click', () => handleFindAllErrorsClick(Number(btn.dataset.tokenIndex)));
      });
      $('#finishChallengeBtn').addEventListener('click', () => finishLevel());
      return;
    }

    screens.game.innerHTML = `
      <div class="card summary">
        <div class="row" style="justify-content:space-between;align-items:center;">
          <div>
            <h2>${escapeHtml(g.level.title)}</h2>
            <p class="muted">Jugador: ${escapeHtml(g.profile.name)}</p>
          </div>
          <div class="pill">Activitat ${g.index + 1} de ${total}</div>
        </div>
        <div class="space"></div>
        <div class="progressbar"><span style="width:${((g.index + 1)/total)*100}%"></span></div>
      </div>
      <div class="space"></div>
      <div class="card activity-card">
        <p class="muted">${escapeHtml(activity.prompt)}</p>
        <div class="space"></div>
        <div class="question">${escapeHtml(activity.question)}</div>
        <div class="options">
          ${activity.options.map(option => `<button class="option-btn" data-answer="${escapeHtml(option)}">${escapeHtml(option)}</button>`).join('')}
        </div>
      </div>
    `;
    switchScreen('game');
    screens.game.querySelectorAll('[data-answer]').forEach(btn => {
      btn.addEventListener('click', () => handleAnswer(btn.textContent));
    });
  }

  function updateChallengeView(activity) {
    const g = state.game;
    const found = g.challenge?.found || [];
    screens.game.querySelectorAll('[data-token-index]').forEach(btn => {
      const token = activity.tokens[Number(btn.dataset.tokenIndex)];
      const isFound = token.errorKey && found.includes(token.errorKey);
      btn.classList.toggle('found', !!isFound);
      btn.disabled = !!isFound;
    });
    const foundCounter = $('#foundCounter');
    const challengeProgress = $('#challengeProgress');
    const finishBtn = $('#finishChallengeBtn');
    if (foundCounter) foundCounter.textContent = found.length;
    if (challengeProgress) challengeProgress.style.width = `${(found.length/activity.errorsToFind)*100}%`;
    if (finishBtn) finishBtn.classList.toggle('hidden', found.length !== activity.errorsToFind);
  }

  function handleFindAllErrorsClick(tokenIndex) {
    const g = state.game;
    const activity = g.activities[g.index];
    const token = activity.tokens[tokenIndex];
    if (!g.challenge) g.challenge = { found: [], wrongClicks: 0 };
    const feedback = $('#challengeFeedback');

    if (token.errorKey) {
      if (g.challenge.found.includes(token.errorKey)) return;
      g.challenge.found.push(token.errorKey);
      g.correct++;
      if (feedback) {
        feedback.className = 'challenge-feedback feedback-good';
        const extraFeedback = token.smartFeedback ? `<div class="space"></div><span>${escapeHtml(token.smartFeedback)}</span>` : '';
        feedback.innerHTML = `✅ Correcte! <strong>${escapeHtml(token.text)}</strong> s’ha d’escriure <strong>${escapeHtml(token.correction)}</strong>.${extraFeedback}`;
      }
      updateChallengeView(activity);
      if (g.challenge.found.length === activity.errorsToFind && feedback) {
        feedback.className = 'challenge-feedback feedback-good';
        feedback.innerHTML = `🎉 ${escapeHtml(activity.correctFeedback)} Pots acabar el repte.`;
      }
    } else {
      g.wrong++;
      g.challenge.wrongClicks++;
      if (feedback) {
        feedback.className = 'challenge-feedback feedback-bad';
        feedback.textContent = activity.incorrectFeedback;
      }
    }
  }

  function handleAnswer(answer) {
    const g = state.game;
    const activity = g.activities[g.index];
    const correct = answer === activity.correctAnswer;
    if (correct) g.correct++; else g.wrong++;

    const responseFeedback = correct
      ? activity.correctFeedback
      : (activity.feedbackByAnswer?.[answer] || activity.incorrectFeedback);

    screens.game.innerHTML = `
      <div class="card empty">
        <h2 class="${correct ? 'feedback-good' : 'feedback-bad'}">${correct ? '✅ Correcte!' : '⚠️ Compte!'}</h2>
        <div class="space"></div>
        <p>${escapeHtml(responseFeedback)}</p>
        ${activity.correction ? `<div class="space"></div><p class="muted">Forma correcta: <strong>${escapeHtml(activity.correction)}</strong></p>` : ''}
        <div class="space"></div>
        <button id="continueAfterFeedback" class="btn">Continuar</button>
      </div>
    `;
    switchScreen('game');
    $('#continueAfterFeedback').addEventListener('click', () => {
      if (g.index === g.activities.length - 1) finishLevel();
      else {
        g.index++;
        renderGameScreen();
      }
    });
  }

  function finishLevel() {
    const g = state.game;
    const stars = calculateStars(g.wrong);
    const progress = getOrCreateProgress(g.profile.id);
    const prevBest = progress.bestStarsByLevel[g.level.id] || 0;
    const isNewBest = stars > prevBest;

    if (!progress.completedLevelIds.includes(g.level.id)) progress.completedLevelIds.push(g.level.id);
    if (stars > prevBest) progress.bestStarsByLevel[g.level.id] = stars;
    progress.lastWorldId = g.level.worldId;
    progress.lastLevelId = g.level.id;

    if (g.level.id === 'bv_final' && !progress.unlockedWorldIds.includes('world_gj')) progress.unlockedWorldIds.push('world_gj');
    if (g.level.id === 'gj_final' && !progress.unlockedWorldIds.includes('world_cqu')) progress.unlockedWorldIds.push('world_cqu');
    if (g.level.id === 'cqu_final' && !progress.unlockedWorldIds.includes('world_rr')) progress.unlockedWorldIds.push('world_rr');
    if (g.level.id === 'rr_final' && !progress.unlockedWorldIds.includes('world_h')) progress.unlockedWorldIds.push('world_h');
    if (g.level.id === 'h_final' && !progress.unlockedWorldIds.includes('world_syllables')) progress.unlockedWorldIds.push('world_syllables');
    if (g.level.id === 'sy_final' && !progress.unlockedWorldIds.includes('world_tonic')) progress.unlockedWorldIds.push('world_tonic');
    if (g.level.id === 'ton_final' && !progress.unlockedWorldIds.includes('world_dh')) progress.unlockedWorldIds.push('world_dh');
    if (g.level.id === 'dh_final' && !progress.unlockedWorldIds.includes('world_accents')) progress.unlockedWorldIds.push('world_accents');
    if (g.level.id === 'acc_final' && !progress.unlockedWorldIds.includes('world_accent_full')) progress.unlockedWorldIds.push('world_accent_full');
    if (g.level.id === 'af_final' && !progress.unlockedWorldIds.includes('world_castle')) progress.unlockedWorldIds.push('world_castle');

    saveProgress(g.profile.id, progress);
    submitRankingScore(g.profile, progress);

    if (g.level.id === 'castle_final') {
      screens.results.innerHTML = `
        <div class="card victory-card">
          <h1>🏆 Has derrotat el Monstre de les Faltes!</h1>
          <svg class="defeated-monster" viewBox="0 0 320 260" role="img" aria-label="Monstre de les Faltes derrotat">
            <rect x="0" y="0" width="320" height="260" rx="24" fill="#fff3df"></rect>
            <path d="M68 170 C78 95, 120 58, 162 64 C216 72, 244 116, 237 178 C229 232, 80 228, 68 170Z" fill="#8BC34A" stroke="#2e7d32" stroke-width="6"></path>
            <path d="M96 73 L74 35 L121 58" fill="#8BC34A" stroke="#2e7d32" stroke-width="6" stroke-linejoin="round"></path>
            <path d="M211 76 L244 39 L232 91" fill="#8BC34A" stroke="#2e7d32" stroke-width="6" stroke-linejoin="round"></path>
            <circle cx="127" cy="126" r="20" fill="white" stroke="#16301f" stroke-width="5"></circle>
            <circle cx="196" cy="126" r="20" fill="white" stroke="#16301f" stroke-width="5"></circle>
            <path d="M117 116 L137 136 M137 116 L117 136 M186 116 L206 136 M206 116 L186 136" stroke="#c62828" stroke-width="6" stroke-linecap="round"></path>
            <path d="M126 177 C146 192, 178 192, 198 177" fill="none" stroke="#16301f" stroke-width="7" stroke-linecap="round"></path>
            <path d="M95 207 L70 234 M225 207 L250 234" stroke="#2e7d32" stroke-width="8" stroke-linecap="round"></path>
            <text x="160" y="44" text-anchor="middle" font-size="34">⭐</text>
            <text x="54" y="218" font-size="34">✏️</text>
            <text x="235" y="219" font-size="34">📚</text>
          </svg>
          <p class="victory-text">
            🎉 Enhorabona! Has superat el castell final i has recuperat la bona ortografia d’OrtogràfiCat. El Monstre de les Faltes ja no pot escampar més errades!
          </p>
          <p class="stars" style="font-size:1.5rem;">${'⭐'.repeat(stars)}</p>
          <div class="summary">
            <p><strong>Encerts:</strong> ${g.correct}</p>
            <p><strong>Errors:</strong> ${g.wrong}</p>
            ${isNewBest ? '<p class="feedback-good">🎉 Nou millor resultat!</p>' : ''}
          </div>
          <div class="actions-inline" style="justify-content:center;">
            <button id="victoryRankingBtn" class="btn secondary">🏆 Veure rànquing</button>
            <button id="backToMainMenuBtn" class="btn">Tornar al menú principal</button>
          </div>
        </div>
      `;
      switchScreen('results');
      $('#backToMainMenuBtn').addEventListener('click', () => renderMapScreen());
      const victoryRankingBtn = $('#victoryRankingBtn');
      if (victoryRankingBtn) victoryRankingBtn.addEventListener('click', renderRankingScreen);
      return;
    }

    screens.results.innerHTML = `
      <div class="card empty">
        <h1>Resultat del nivell</h1>
        <div class="space"></div>
        <p class="stars" style="font-size:1.5rem;">${'⭐'.repeat(stars)}</p>
        <div class="space"></div>
        <p><strong>Encerts:</strong> ${g.correct}</p>
        <p><strong>Errors:</strong> ${g.wrong}</p>
        ${isNewBest ? '<div class="space"></div><p class="feedback-good">🎉 Nou millor resultat!</p>' : ''}
        <div class="space"></div>
        <div class="actions-inline" style="justify-content:center;">
          <button id="repeatLevelBtn" class="btn secondary">Repetir</button>
          <button id="backToLevelsBtn" class="btn">Tornar als nivells</button>
        </div>
      </div>
    `;
    switchScreen('results');
    $('#repeatLevelBtn').addEventListener('click', () => startGame(g.level.id));
    $('#backToLevelsBtn').addEventListener('click', () => renderLevelsScreen(g.level.worldId));
  }

  renderProfilesScreen();
})();
</script>
</body>
</html>
