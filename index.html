<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrtogràfiCat</title>
  <style>
    :root {
      --bg: #f6faf6;
      --card: #ffffff;
      --text: #16301f;
      --muted: #61746a;
      --primary: #2e7d32;
      --primary-2: #4caf50;
      --border: #d7e3d8;
      --danger: #c62828;
      --warning: #ef6c00;
      --shadow: 0 10px 24px rgba(20, 50, 30, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); }
    button, input, select { font: inherit; }
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; background: rgba(255,255,255,0.9); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
    }
    .brand { font-weight: 800; font-size: 1.3rem; }
    .top-actions { display: flex; gap: 10px; align-items: center; }
    .container { width: min(980px, calc(100% - 24px)); margin: 18px auto 28px; }
    .screen { display: none; }
    .screen.active { display: block; }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 18px;
    }
    .hero { display: grid; gap: 12px; }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 1.8rem; }
    h2 { font-size: 1.35rem; }
    .muted { color: var(--muted); }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .space { height: 14px; }
    .btn {
      border: 0; background: var(--primary); color: white; padding: 12px 16px; border-radius: 14px;
      cursor: pointer; font-weight: 700; transition: .18s transform, .18s opacity, .18s background;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.secondary { background: white; color: var(--text); border: 1px solid var(--border); }
    .btn.ghost { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    .btn.danger { background: var(--danger); }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .pill {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px;
      border: 1px solid var(--border); background: white; font-weight: 600;
    }
    .grid { display: grid; gap: 14px; }
    .grid.profiles { grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); }
    .grid.worlds, .grid.levels { grid-template-columns: 1fr; }
    .profile-card, .world-card, .level-card {
      display: grid; gap: 12px; padding: 16px; border-radius: 18px; background: white; border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .profile-head, .world-head, .level-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .avatar {
      width: 62px; height: 62px; display: grid; place-items: center; font-size: 1.8rem;
      border-radius: 50%; background: #eaf5ea; border: 1px solid var(--border);
    }
    .active-badge { color: var(--primary); font-weight: 800; }
    .locked { opacity: .62; }
    .stats { display: flex; gap: 10px; flex-wrap: wrap; }
    .world-emoji, .flag { font-size: 1.7rem; }
    .actions-inline { display: flex; gap: 8px; flex-wrap: wrap; }
    .activity-card { padding: 20px; }
    .question { font-size: 1.45rem; font-weight: 800; line-height: 1.35; }
    .options { display: grid; gap: 10px; margin-top: 18px; }
    .option-btn {
      width: 100%; text-align: left; background: white; color: var(--text); border: 1px solid var(--border);
      padding: 14px 16px; border-radius: 14px; cursor: pointer; font-weight: 600;
    }
    .option-btn:hover { border-color: var(--primary); }
    .progressbar { width: 100%; height: 12px; border-radius: 999px; background: #e7f1e8; overflow: hidden; }
    .progressbar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-2)); }
    .feedback-good { color: var(--primary); font-weight: 800; }
    .feedback-bad { color: var(--warning); font-weight: 800; }
    .stars { letter-spacing: 2px; }
    .empty { text-align: center; padding: 30px 18px; }
    .hidden { display: none !important; }
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(10, 24, 12, 0.42); display: none;
      align-items: center; justify-content: center; padding: 18px; z-index: 20;
    }
    .modal-backdrop.active { display: flex; }
    .modal { width: min(520px, 100%); background: white; border-radius: 20px; padding: 18px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .field { display: grid; gap: 8px; }
    input[type="text"] {
      width: 100%; padding: 12px 14px; border-radius: 14px; border: 1px solid var(--border); outline: none;
    }
    input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(46,125,50,.12); }
    .avatar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .avatar-choice {
      border: 1px solid var(--border); border-radius: 16px; padding: 12px; text-align: center; cursor: pointer; background: white;
      font-size: 1.6rem;
    }
    .avatar-choice.selected { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(46,125,50,.12); }
    .error-text { color: var(--danger); font-size: 0.95rem; font-weight: 700; }
    .summary { display: grid; gap: 10px; }
    @media (max-width: 640px) {
      .container { width: calc(100% - 16px); }
      .topbar { padding: 14px 12px; }
      .avatar-grid { grid-template-columns: repeat(2, 1fr); }
      .question { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">OrtogràfiCat</div>
    <div class="top-actions">
      <button id="backBtn" class="btn secondary hidden">← Enrere</button>
      <button id="homeBtn" class="btn secondary hidden">Perfils</button>
    </div>
  </div>

  <div class="container">
    <section id="screen-profiles" class="screen active"></section>
    <section id="screen-map" class="screen"></section>
    <section id="screen-levels" class="screen"></section>
    <section id="screen-game" class="screen"></section>
    <section id="screen-results" class="screen"></section>
  </div>
</div>

<div id="profileModal" class="modal-backdrop">
  <div class="modal">
    <div class="row" style="justify-content:space-between;align-items:center;">
      <h3 id="profileModalTitle">Nou perfil</h3>
      <button id="closeProfileModal" class="btn secondary">Tancar</button>
    </div>
    <div class="space"></div>
    <div class="field">
      <label for="profileName">Nom del perfil</label>
      <input id="profileName" type="text" maxlength="20" placeholder="Escriu un nom" />
      <div id="profileNameError" class="error-text hidden"></div>
    </div>
    <div class="space"></div>
    <div class="field">
      <label>Tria un avatar</label>
      <div id="avatarGrid" class="avatar-grid"></div>
    </div>
    <div class="space"></div>
    <div class="actions-inline" style="justify-content:flex-end;">
      <button id="cancelProfileModal" class="btn secondary">Cancel·lar</button>
      <button id="saveProfileBtn" class="btn">Desar</button>
    </div>
  </div>
</div>

    { id:'acc_f_a2', levelId:'acc_final', type:'findError', prompt:'Troba l’error al text.', question:'L’avio porta musica i cafe. Tambe arriba un camio amb melo.', options:['avio','musica','cafe','Tambe','camio','melo'], correctAnswer:'musica', correction:'música', correctFeedback:'Correcte! El segon error és musica.', incorrectFeedback:'Ara toca corregir musica → música.' },
    { id:'acc_f_a3', levelId:'acc_final', type:'findError', prompt:'Troba l’error al text.', question:'L’avio porta musica i cafe. Tambe arriba un camio amb melo.', options:['avio','musica','cafe','Tambe','camio','melo'], correctAnswer:'cafe', correction:'cafè', correctFeedback:'Correcte! El tercer error és cafe.', incorrectFeedback:'Ara toca corregir cafe → cafè.' }
  ];

  const state = {
    currentScreen: 'profiles',
    currentWorldId: null,
    currentLevelId: null,
    game: null,
    editingProfileId: null,
  };

  const $ = (sel) => document.querySelector(sel);
  const screens = {
    profiles: $('#screen-profiles'),
    map: $('#screen-map'),
    levels: $('#screen-levels'),
    game: $('#screen-game'),
    results: $('#screen-results')
  };

  const backBtn = $('#backBtn');
  const homeBtn = $('#homeBtn');
  const profileModal = $('#profileModal');
  const profileModalTitle = $('#profileModalTitle');
  const profileNameInput = $('#profileName');
  const profileNameError = $('#profileNameError');
  const avatarGrid = $('#avatarGrid');
  const saveProfileBtn = $('#saveProfileBtn');
  const cancelProfileModal = $('#cancelProfileModal');
  const closeProfileModal = $('#closeProfileModal');

  function loadProfiles() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.profiles) || '[]'); }
    catch { return []; }
  }
  function saveProfiles(profiles) { localStorage.setItem(STORAGE_KEYS.profiles, JSON.stringify(profiles)); }
  function getActiveProfileId() { return localStorage.getItem(STORAGE_KEYS.activeProfileId); }
  function setActiveProfileId(id) { localStorage.setItem(STORAGE_KEYS.activeProfileId, id); }
  function clearActiveProfileId() { localStorage.removeItem(STORAGE_KEYS.activeProfileId); }
  function progressKey(profileId) { return STORAGE_KEYS.progressPrefix + profileId; }
  function loadProgress(profileId) {
    try { return JSON.parse(localStorage.getItem(progressKey(profileId)) || 'null'); }
    catch { return null; }
  }
  function saveProgress(profileId, progress) { localStorage.setItem(progressKey(profileId), JSON.stringify(progress)); }
  function defaultProgress(profileId) {
    return {
      profileId,
      unlockedWorldIds: ['world_bv'],
      completedLevelIds: [],
      bestStarsByLevel: {},
      coins: 0,
      lastWorldId: null,
      lastLevelId: null,
      skillProgress: { bv: 0, gj: 0, accents: 0 }
    };
  }
  function getOrCreateProgress(profileId) {
    let p = loadProgress(profileId);
    if (!p) {
      p = defaultProgress(profileId);
      saveProgress(profileId, p);
    }
    return p;
  }
  function deleteProgress(profileId) { localStorage.removeItem(progressKey(profileId)); }
  function getActiveProfile() {
    const id = getActiveProfileId();
    if (!id) return null;
    return loadProfiles().find(p => p.id === id) || null;
  }
  function profileAvatar(profile) { return AVATARS[profile.avatarId] || '🙂'; }
  function worldById(id) { return WORLDS.find(w => w.id === id); }
  function levelsForWorld(worldId) { return LEVELS.filter(l => l.worldId === worldId).sort((a,b) => a.order - b.order); }
  function activitiesForLevel(levelId) { return ACTIVITIES.filter(a => a.levelId === levelId).sort((a,b) => a.id.localeCompare(b.id)); }
  function totalStars(progress) { return Object.values(progress.bestStarsByLevel || {}).reduce((a,b) => a + b, 0); }
  function isWorldUnlocked(progress, worldId) { return progress.unlockedWorldIds.includes(worldId); }
  function isLevelUnlocked(levels, progress, level) {
    if (level.order === 1) return true;
    if (level.isFinalChallenge) {
      const regular = levels.filter(l => !l.isFinalChallenge);
      return regular.every(l => progress.completedLevelIds.includes(l.id));
    }
    const prev = levels.find(l => l.order === level.order - 1);
    return !!prev && progress.completedLevelIds.includes(prev.id);
  }
  function starsForLevel(progress, levelId) { return progress.bestStarsByLevel[levelId] || 0; }
  function calculateStars(wrongAnswers) { return wrongAnswers === 0 ? 3 : wrongAnswers === 1 ? 2 : 1; }
  function calculateCoins(stars) { return stars === 3 ? 15 : 10; }
  function nowIso() { return new Date().toISOString(); }
  function uid() { return 'profile_' + Math.random().toString(36).slice(2, 10); }
  function escapeHtml(str) {
    return String(str).replace(/[&<>'"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[s]));
  }

  function switchScreen(name) {
    Object.entries(screens).forEach(([key, el]) => el.classList.toggle('active', key === name));
    state.currentScreen = name;
    updateNavButtons();
  }

  function updateNavButtons() {
    const showBack = state.currentScreen === 'map' || state.currentScreen === 'levels' || state.currentScreen === 'game' || state.currentScreen === 'results';
    const showHome = state.currentScreen !== 'profiles';
    backBtn.classList.toggle('hidden', !showBack);
    homeBtn.classList.toggle('hidden', !showHome);
  }

  function backAction() {
    if (state.currentScreen === 'map') renderProfilesScreen();
    else if (state.currentScreen === 'levels') renderMapScreen();
    else if (state.currentScreen === 'game') renderLevelsScreen(state.currentWorldId);
    else if (state.currentScreen === 'results') renderLevelsScreen(state.currentWorldId);
  }

  backBtn.addEventListener('click', backAction);
  homeBtn.addEventListener('click', () => renderProfilesScreen());

  function openProfileModal(profile = null) {
    state.editingProfileId = profile ? profile.id : null;
    profileModalTitle.textContent = profile ? 'Editar perfil' : 'Nou perfil';
    profileNameInput.value = profile ? profile.name : '';
    profileNameError.textContent = '';
    profileNameError.classList.add('hidden');
    renderAvatarChoices(profile ? profile.avatarId : 'drac_blau');
    profileModal.classList.add('active');
    setTimeout(() => profileNameInput.focus(), 30);
  }
  function closeProfileModalFn() { profileModal.classList.remove('active'); }
  cancelProfileModal.addEventListener('click', closeProfileModalFn);
  closeProfileModal.addEventListener('click', closeProfileModalFn);
  profileModal.addEventListener('click', (e) => { if (e.target === profileModal) closeProfileModalFn(); });

  function renderAvatarChoices(selectedId) {
    avatarGrid.innerHTML = Object.entries(AVATARS).map(([id, emoji]) => `
      <button type="button" class="avatar-choice ${id === selectedId ? 'selected' : ''}" data-avatar-id="${id}">
        <div>${emoji}</div>
        <div style="font-size:.85rem; margin-top:6px;">${escapeHtml(id.replaceAll('_', ' '))}</div>
      </button>
    `).join('');
  }

  avatarGrid.addEventListener('click', (e) => {
    const btn = e.target.closest('.avatar-choice');
    if (!btn) return;
    avatarGrid.querySelectorAll('.avatar-choice').forEach(el => el.classList.remove('selected'));
    btn.classList.add('selected');
  });

  saveProfileBtn.addEventListener('click', () => {
    const rawName = profileNameInput.value.trim();
    const avatarSelected = avatarGrid.querySelector('.avatar-choice.selected')?.dataset.avatarId || 'drac_blau';
    if (!rawName) {
      profileNameError.textContent = 'Has d’escriure un nom.';
      profileNameError.classList.remove('hidden');
      return;
    }
    if (rawName.length > 20) {
      profileNameError.textContent = 'El nom no pot superar els 20 caràcters.';
      profileNameError.classList.remove('hidden');
      return;
    }
    profileNameError.classList.add('hidden');

    const profiles = loadProfiles();
    if (state.editingProfileId) {
      const idx = profiles.findIndex(p => p.id === state.editingProfileId);
      if (idx >= 0) {
        profiles[idx] = { ...profiles[idx], name: rawName, avatarId: avatarSelected, lastPlayedAt: nowIso() };
        saveProfiles(profiles);
      }
    } else {
      const profile = {
        id: uid(),
        name: rawName,
        avatarId: avatarSelected,
        createdAt: nowIso(),
        lastPlayedAt: nowIso()
      };
      profiles.push(profile);
      saveProfiles(profiles);
      setActiveProfileId(profile.id);
      getOrCreateProgress(profile.id);
    }
    closeProfileModalFn();
    renderProfilesScreen();
  });

  function renderProfilesScreen() {
    const profiles = loadProfiles().sort((a,b) => new Date(b.lastPlayedAt) - new Date(a.lastPlayedAt));
    const activeId = getActiveProfileId();
    screens.profiles.innerHTML = `
      <div class="card hero">
        <h1>Tria o crea un perfil</h1>
        <p class="muted">Cada perfil guarda el seu progrés al mateix navegador. És la manera més simple i gratuïta de fer funcionar OrtogràfiCat.</p>
        <div class="row">
          <button id="newProfileBtn" class="btn">+ Nou perfil</button>
        </div>
      </div>
      <div class="space"></div>
      ${profiles.length === 0 ? `
        <div class="card empty">
          <h2>Encara no hi ha cap perfil creat.</h2>
          <div class="space"></div>
          <p class="muted">Crea’n un per començar a jugar.</p>
          <div class="space"></div>
          <button id="emptyCreateBtn" class="btn">Crear perfil</button>
        </div>
      ` : `
        <div class="grid profiles">
          ${profiles.map(profile => `
            <div class="profile-card">
              <div class="profile-head">
                <div class="avatar">${profileAvatar(profile)}</div>
                <div class="actions-inline">
                  <button class="btn secondary" data-edit-profile="${profile.id}">Editar</button>
                  <button class="btn danger" data-delete-profile="${profile.id}">Eliminar</button>
                </div>
              </div>
              <div>
                <h3>${escapeHtml(profile.name)}</h3>
                <div class="space"></div>
                <div class="${profile.id === activeId ? 'active-badge' : 'muted'}">${profile.id === activeId ? 'Perfil actiu' : 'Toca per seleccionar-lo'}</div>
              </div>
              <div class="actions-inline">
                <button class="btn ${profile.id === activeId ? 'secondary' : ''}" data-select-profile="${profile.id}">${profile.id === activeId ? 'Continuar' : 'Seleccionar'}</button>
              </div>
            </div>
          `).join('')}
        </div>
      `}
    `;
    switchScreen('profiles');
    $('#newProfileBtn')?.addEventListener('click', () => openProfileModal());
    $('#emptyCreateBtn')?.addEventListener('click', () => openProfileModal());
    screens.profiles.querySelectorAll('[data-edit-profile]').forEach(btn => {
      btn.addEventListener('click', () => {
        const profile = profiles.find(p => p.id === btn.dataset.editProfile);
        if (profile) openProfileModal(profile);
      });
    });
    screens.profiles.querySelectorAll('[data-delete-profile]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.deleteProfile;
        const profile = profiles.find(p => p.id === id);
        if (!profile) return;
        if (!confirm(`Vols eliminar el perfil "${profile.name}"? També s'esborrarà el seu progrés.`)) return;
        const updated = profiles.filter(p => p.id !== id);
        saveProfiles(updated);
        deleteProgress(id);
        if (getActiveProfileId() === id) {
          if (updated[0]) setActiveProfileId(updated[0].id);
          else clearActiveProfileId();
        }
        renderProfilesScreen();
      });
    });
    screens.profiles.querySelectorAll('[data-select-profile]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.selectProfile;
        const updatedProfiles = profiles.map(p => p.id === id ? { ...p, lastPlayedAt: nowIso() } : p);
        saveProfiles(updatedProfiles);
        setActiveProfileId(id);
        getOrCreateProgress(id);
        renderMapScreen();
      });
    });
  }

  function renderMapScreen() {
    const profile = getActiveProfile();
    if (!profile) return renderProfilesScreen();
    const progress = getOrCreateProgress(profile.id);
    screens.map.innerHTML = `
      <div class="card summary">
        <h1>Hola, ${escapeHtml(profile.name)}</h1>
        <p class="muted">Tria un món per continuar l’aventura ortogràfica.</p>
        <div class="stats">
          <div class="pill">⭐ ${totalStars(progress)} estrelles</div>
          <div class="pill">🪙 ${progress.coins} monedes</div>
        </div>
      </div>
      <div class="space"></div>
      <div class="grid worlds">
        ${WORLDS.map(world => {
          const unlocked = isWorldUnlocked(progress, world.id);
          return `
            <div class="world-card ${unlocked ? '' : 'locked'}">
              <div class="world-head">
                <div class="row" style="align-items:center;">
                  <div class="avatar">${world.emoji}</div>
                  <div>
                    <h3>${escapeHtml(world.title)}</h3>
                    <div class="space"></div>
                    <p class="muted">${escapeHtml(world.description)}</p>
                  </div>
                </div>
                <div class="flag">${unlocked ? '➡️' : '🔒'}</div>
              </div>
              <div class="actions-inline">
                <button class="btn ${unlocked ? '' : 'secondary'}" data-open-world="${world.id}">${unlocked ? 'Entrar al món' : 'Bloquejat'}</button>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    switchScreen('map');
    screens.map.querySelectorAll('[data-open-world]').forEach(btn => {
      btn.addEventListener('click', () => {
        const worldId = btn.dataset.openWorld;
        if (!isWorldUnlocked(progress, worldId)) {
          alert('Completa el món anterior per desbloquejar-lo.');
          return;
        }
        renderLevelsScreen(worldId);
      });
    });
  }

  function renderLevelsScreen(worldId) {
    const profile = getActiveProfile();
    if (!profile) return renderProfilesScreen();
    const progress = getOrCreateProgress(profile.id);
    const world = worldById(worldId);
    if (!world) return renderMapScreen();
    const levels = levelsForWorld(worldId);
    state.currentWorldId = worldId;
    screens.levels.innerHTML = `
      <div class="card summary">
        <h1>${world.emoji} ${escapeHtml(world.title)}</h1>
        <p class="muted">${escapeHtml(world.description)}</p>
        <div class="stats">
          <div class="pill">Jugador: ${escapeHtml(profile.name)}</div>
          <div class="pill">Nivells completats: ${levels.filter(l => progress.completedLevelIds.includes(l.id)).length}/${levels.length}</div>
        </div>
      </div>
      <div class="space"></div>
      <div class="grid levels">
        ${levels.map(level => {
          const unlocked = isLevelUnlocked(levels, progress, level);
          const stars = starsForLevel(progress, level.id);
          return `
            <div class="level-card ${unlocked ? '' : 'locked'}">
              <div class="level-head">
                <div class="row" style="align-items:center;">
                  <div class="avatar">${level.isFinalChallenge ? '🏁' : level.order}</div>
                  <div>
                    <h3>${escapeHtml(level.title)}</h3>
                    <div class="space"></div>
                    <p class="muted">${escapeHtml(level.instructions)}</p>
                  </div>
                </div>
                <div class="stars">${'⭐'.repeat(stars)}</div>
              </div>
              <div class="actions-inline">
                <button class="btn ${unlocked ? '' : 'secondary'}" data-open-level="${level.id}">${unlocked ? 'Jugar nivell' : 'Bloquejat'}</button>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    switchScreen('levels');
    screens.levels.querySelectorAll('[data-open-level]').forEach(btn => {
      btn.addEventListener('click', () => {
        const levelId = btn.dataset.openLevel;
        const level = levels.find(l => l.id === levelId);
        if (!level) return;
        if (!isLevelUnlocked(levels, progress, level)) {
          alert('Completa el nivell anterior per desbloquejar-lo.');
          return;
        }
        startGame(levelId);
      });
    });
  }

  function startGame(levelId) {
    const profile = getActiveProfile();
    if (!profile) return renderProfilesScreen();
    const progress = getOrCreateProgress(profile.id);
    const level = LEVELS.find(l => l.id === levelId);
    const activities = activitiesForLevel(levelId);
    if (!level || activities.length === 0) {
      alert('No s’ha pogut carregar aquest nivell.');
      return;
    }
    state.currentLevelId = levelId;
    state.game = {
      profile,
      progress,
      level,
      activities,
      index: 0,
      correct: 0,
      wrong: 0
    };
    renderGameScreen();
  }

  function renderGameScreen() {
    const g = state.game;
    if (!g) return renderLevelsScreen(state.currentWorldId);
    const activity = g.activities[g.index];
    const total = g.activities.length;
    screens.game.innerHTML = `
      <div class="card summary">
        <div class="row" style="justify-content:space-between;align-items:center;">
          <div>
            <h2>${escapeHtml(g.level.title)}</h2>
            <p class="muted">Jugador: ${escapeHtml(g.profile.name)}</p>
          </div>
          <div class="pill">Activitat ${g.index + 1} de ${total}</div>
        </div>
        <div class="space"></div>
        <div class="progressbar"><span style="width:${((g.index + 1)/total)*100}%"></span></div>
      </div>
      <div class="space"></div>
      <div class="card activity-card">
        <p class="muted">${escapeHtml(activity.prompt)}</p>
        <div class="space"></div>
        <div class="question">${escapeHtml(activity.question)}</div>
        <div class="options">
          ${activity.options.map(option => `<button class="option-btn" data-answer="${escapeHtml(option)}">${escapeHtml(option)}</button>`).join('')}
        </div>
      </div>
    `;
    switchScreen('game');
    screens.game.querySelectorAll('[data-answer]').forEach(btn => {
      btn.addEventListener('click', () => handleAnswer(btn.textContent));
    });
  }

  function handleAnswer(answer) {
    const g = state.game;
    const activity = g.activities[g.index];
    const correct = answer === activity.correctAnswer;
    if (correct) g.correct++; else g.wrong++;

    screens.game.innerHTML = `
      <div class="card empty">
        <h2 class="${correct ? 'feedback-good' : 'feedback-bad'}">${correct ? '✅ Correcte!' : '⚠️ Compte!'}</h2>
        <div class="space"></div>
        <p>${escapeHtml(correct ? activity.correctFeedback : activity.incorrectFeedback)}</p>
        ${activity.correction ? `<div class="space"></div><p class="muted">Forma correcta: <strong>${escapeHtml(activity.correction)}</strong></p>` : ''}
        <div class="space"></div>
        <button id="continueAfterFeedback" class="btn">Continuar</button>
      </div>
    `;
    switchScreen('game');
    $('#continueAfterFeedback').addEventListener('click', () => {
      if (g.index === g.activities.length - 1) finishLevel();
      else {
        g.index++;
        renderGameScreen();
      }
    });
  }

  function finishLevel() {
    const g = state.game;
    const stars = calculateStars(g.wrong);
    const coins = calculateCoins(stars);
    const progress = getOrCreateProgress(g.profile.id);
    const prevBest = progress.bestStarsByLevel[g.level.id] || 0;
    const isNewBest = stars > prevBest;

    if (!progress.completedLevelIds.includes(g.level.id)) progress.completedLevelIds.push(g.level.id);
    if (stars > prevBest) progress.bestStarsByLevel[g.level.id] = stars;
    progress.coins += coins;
    progress.lastWorldId = g.level.worldId;
    progress.lastLevelId = g.level.id;

    if (g.level.id === 'bv_final' && !progress.unlockedWorldIds.includes('world_gj')) progress.unlockedWorldIds.push('world_gj');
    if (g.level.id === 'gj_final' && !progress.unlockedWorldIds.includes('world_accents')) progress.unlockedWorldIds.push('world_accents');

    saveProgress(g.profile.id, progress);

    screens.results.innerHTML = `
      <div class="card empty">
        <h1>Resultat del nivell</h1>
        <div class="space"></div>
        <p class="stars" style="font-size:1.5rem;">${'⭐'.repeat(stars)}</p>
        <div class="space"></div>
        <p><strong>Encerts:</strong> ${g.correct}</p>
        <p><strong>Errors:</strong> ${g.wrong}</p>
        <p><strong>Monedes guanyades:</strong> ${coins}</p>
        ${isNewBest ? '<div class="space"></div><p class="feedback-good">🎉 Nou millor resultat!</p>' : ''}
        <div class="space"></div>
        <div class="actions-inline" style="justify-content:center;">
          <button id="repeatLevelBtn" class="btn secondary">Repetir</button>
          <button id="backToLevelsBtn" class="btn">Tornar als nivells</button>
        </div>
      </div>
    `;
    switchScreen('results');
    $('#repeatLevelBtn').addEventListener('click', () => startGame(g.level.id));
    $('#backToLevelsBtn').addEventListener('click', () => renderLevelsScreen(g.level.worldId));
  }

  renderProfilesScreen();
})();
</script>
</body>
</html>
